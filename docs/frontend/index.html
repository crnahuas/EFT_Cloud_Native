<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDY2204 EFT - Cliente de pruebas</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --border: #d8dee8;
      --text: #172033;
      --muted: #5c667a;
      --accent: #176c85;
      --accent-dark: #0f5266;
      --danger: #9d2c2c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      font: inherit;
      background: #fff;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button.secondary {
      background: #445066;
    }

    .output {
      min-height: 280px;
      white-space: pre-wrap;
      overflow: auto;
      background: #111827;
      color: #d9f99d;
      border-radius: 8px;
      padding: 14px;
      font-family: Menlo, Consolas, monospace;
      font-size: 13px;
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    @media (max-width: 820px) {
      main {
        padding: 16px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>CDY2204 EFT - Cliente de pruebas</h1>
      <p>Cliente local para demostrar API Gateway o EC2 con JWT emitido por Azure AD B2C.</p>
    </header>

    <section>
      <h2>Conexion</h2>
      <label for="baseUrl">URL base</label>
      <input id="baseUrl" value="http://localhost:8080" autocomplete="off">
      <label for="token">JWT Azure AD B2C</label>
      <textarea id="token" placeholder="Pegar token sin la palabra Bearer"></textarea>
    </section>

    <div class="grid" style="margin-top: 16px;">
      <section>
        <h2>Curso e inscripcion</h2>
        <label for="cursoNombre">Nombre curso</label>
        <input id="cursoNombre" value="Spring Boot Cloud Native">
        <label for="instructor">Instructor</label>
        <input id="instructor" value="Docente CDY2204">
        <label for="duracion">Duracion</label>
        <input id="duracion" value="24 horas">
        <label for="costo">Costo</label>
        <input id="costo" type="number" value="120000">
        <label for="estudianteNombre">Estudiante</label>
        <input id="estudianteNombre" value="Maria Perez">
        <label for="estudianteEmail">Email</label>
        <input id="estudianteEmail" value="maria.perez@duocuc.cl">
        <label for="cursoId">Curso ID</label>
        <input id="cursoId" type="number" value="1">
        <label for="numeroResumen">Numero resumen</label>
        <input id="numeroResumen" type="number" value="1">
        <div class="actions">
          <button onclick="listarCursos()">Listar cursos</button>
          <button onclick="crearCurso()">Crear curso</button>
          <button onclick="crearInscripcion()">Crear inscripcion</button>
        </div>
      </section>

      <section>
        <h2>Flujo Cloud</h2>
        <div class="actions">
          <button onclick="generarResumen()">Generar resumen</button>
          <button onclick="producirRabbit()">Producir RabbitMQ</button>
          <button onclick="consumirRabbit()">Consumir RabbitMQ</button>
          <button onclick="subirS3()">Subir S3</button>
          <button onclick="descargarS3()">Descargar S3</button>
          <button class="secondary" onclick="limpiarSalida()">Limpiar</button>
        </div>
        <label>Resultado</label>
        <div id="output" class="output">Listo para probar.</div>
      </section>
    </div>
  </main>

  <script>
    const output = document.getElementById('output');

    function value(id) {
      return document.getElementById(id).value.trim();
    }

    function numeroResumen() {
      return encodeURIComponent(value('numeroResumen'));
    }

    function headers(json) {
      const token = value('token');
      const result = {};
      if (token) {
        result.Authorization = `Bearer ${token}`;
      }
      if (json) {
        result['Content-Type'] = 'application/json';
      }
      return result;
    }

    async function call(path, options = {}) {
      const base = value('baseUrl').replace(/\/$/, '');
      const response = await fetch(`${base}${path}`, options);
      const text = await response.text();
      let body = text;
      try {
        body = JSON.stringify(JSON.parse(text), null, 2);
      } catch (error) {
        body = text || '(sin cuerpo)';
      }
      output.textContent = `${options.method || 'GET'} ${path}\nHTTP ${response.status}\n\n${body}`;
      if (!response.ok) {
        output.classList.add('error');
      } else {
        output.classList.remove('error');
      }
      return response;
    }

    function listarCursos() {
      return call('/cursos', { headers: headers(false) });
    }

    function crearCurso() {
      return call('/cursos', {
        method: 'POST',
        headers: headers(true),
        body: JSON.stringify({
          nombre: value('cursoNombre'),
          instructor: value('instructor'),
          duracion: value('duracion'),
          costo: Number(value('costo'))
        })
      });
    }

    function crearInscripcion() {
      return call('/inscripciones', {
        method: 'POST',
        headers: headers(true),
        body: JSON.stringify({
          estudianteNombre: value('estudianteNombre'),
          estudianteEmail: value('estudianteEmail'),
          cursoIds: [Number(value('cursoId'))]
        })
      });
    }

    function generarResumen() {
      return call(`/inscripciones/${numeroResumen()}/resumen`, { headers: headers(false) });
    }

    function producirRabbit() {
      return call(`/inscripciones/${numeroResumen()}/resumenes-mq/producir`, {
        method: 'POST',
        headers: headers(false)
      });
    }

    function consumirRabbit() {
      return call('/inscripciones/resumenes-mq/consumir', {
        method: 'POST',
        headers: headers(false)
      });
    }

    function subirS3() {
      return call(`/s3/uploadResumen?numeroResumen=${numeroResumen()}`, {
        method: 'POST',
        headers: headers(false)
      });
    }

    function descargarS3() {
      return call(`/s3/downloadResumen?numeroResumen=${numeroResumen()}`, {
        headers: headers(false)
      });
    }

    function limpiarSalida() {
      output.classList.remove('error');
      output.textContent = 'Listo para probar.';
    }
  </script>
</body>
</html>
